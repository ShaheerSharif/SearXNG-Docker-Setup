name: searxng

services:
  core:
    container_name: searxng-core
    image: docker.io/searxng/searxng:${SEARXNG_VERSION:-latest}
    restart: unless-stopped
    env_file: ./.env
    environment:
      - UWSGI_WORKERS={UWSGI_WORKERS:-2}
      - UWSGI_THREADS={UWSGI_THREADS:-2}
    ports:
      - "${SEARXNG_PORT:-8181}:8080"
    volumes:
      - ./core-config/:/etc/searxng/:Z
      - ./templates:/usr/local/searxng/searx/templates
      - searxng-core-data:/var/cache/searxng/
    networks:
      - searxng-network
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  valkey:
    container_name: searxng-valkey
    image: docker.io/valkey/valkey:9-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - searxng-valkey-data:/data/
    networks:
      - searxng-network
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

volumes:
  searxng-core-data:
  searxng-valkey-data:

networks:
  searxng-network:
    driver: bridge
