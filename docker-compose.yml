name: searxng

services:
  core:
    container_name: searxng-core
    image: docker.io/searxng/searxng:${SEARXNG_VERSION:-latest}
    restart: unless-stopped
    env_file: ./.env
    volumes:
      - ./core-config/:/etc/searxng/:Z
      - ./templates:/usr/local/searxng/searx/templates
      - searxng-core-data:/var/cache/searxng/
    networks:
      - searxng-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${SEARXNG_PORT:-8080}/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  valkey:
    container_name: searxng-valkey
    image: docker.io/valkey/valkey:9-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - searxng-valkey-data:/data/
    networks:
      - searxng-network
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  nginx:
    container_name: searxng-nginx
    image: nginx:mainline-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    env_file: ./.env
    environment:
      - DOMAIN_NAME=${SUBDOMAIN}.${DOMAIN}
      - SEARXNG_URL=http://core:${SEARXNG_PORT:-8080}/
    command: >
      /bin/sh -c "envsubst '$${DOMAIN_NAME} $${SEARXNG_URL}'
      < /etc/nginx/conf.d/default.conf.template
      > /etc/nginx/conf.d/default.conf
      && nginx -g 'daemon off;'"
    configs:
      - source: nginx-config
        target: /etc/nginx/conf.d/default.conf.template
        mode: 0444
    networks:
      - searxng-network
    depends_on:
      core:
        condition: service_healthy
      valkey:
        condition: service_healthy

volumes:
  searxng-core-data:
  searxng-valkey-data:

networks:
  searxng-network:
    driver: bridge

configs:
  nginx-config:
    file: ./nginx/default.conf.template
